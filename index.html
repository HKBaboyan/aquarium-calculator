<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquarium Volume Calculator - Liters & Gallons</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="hero">
            <span class="eyebrow">Aquarium Planning</span>
            <h1>Aquarium Volume Calculator</h1>
            <p>Convert tank dimensions to liters and US gallons with a single click.</p>
        </header>

        <section class="card">
            <div class="form-group">
                <label for="unit">Unit System</label>
                <select id="unit" aria-label="Unit System">
                    <option value="inches">Inches (US Gallons)</option>
                    <option value="cm">Centimeters (Liters)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="length">Length</label>
                <input type="number" id="length" placeholder="e.g. 24" min="0" aria-label="Length">
            </div>

            <div class="form-group">
                <label for="width">Width</label>
                <input type="number" id="width" placeholder="e.g. 12" min="0" aria-label="Width">
            </div>

            <div class="form-group">
                <label for="height">Height</label>
                <input type="number" id="height" placeholder="e.g. 16" min="0" aria-label="Height">
            </div>

            <button type="button" onclick="calculate()">Calculate Volume</button>

            <div id="result" aria-live="polite"></div>
        </section>

        <footer class="footer-note">Perfect for hobbyists, aquascapers, and beginner tank builders.</footer>
    </div>

    <script src="./script.js"></script>
</body>
</html>
